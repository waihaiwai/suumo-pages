<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUUMO 物件マップ - 2026-03-08</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
#panel-toggle { display: none; }

#panel {
  position: absolute; top: 12px; right: 12px; z-index: 1000;
  background: rgba(255,255,255,0.97); border-radius: 12px;
  padding: 16px; width: 300px; max-height: calc(100vh - 24px);
  overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  font-size: 13px; backdrop-filter: blur(8px);
}
#panel h1 { font-size: 16px; margin-bottom: 2px; }
#panel .subtitle { color: #666; font-size: 11px; margin-bottom: 12px; }
#panel .subtitle a { color: #4A90D9; text-decoration: none; font-weight: 600; }
#panel .subtitle a:hover { text-decoration: underline; }

.section { margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
.section:last-child { border-bottom: none; margin-bottom: 0; }
.section-title { font-weight: 600; font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

.filter-row { margin: 6px 0; }
.filter-row label { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 3px; }
.filter-row select, .filter-row input { padding: 5px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; background: #fff; width: 100%; }
.filter-row .range-row { display: flex; gap: 4px; align-items: center; }
.filter-row .range-row input { width: 80px; }
.filter-value { color: #4A90D9; font-weight: 600; }

.toggle-row {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 0; cursor: pointer; user-select: none;
}
.toggle-row input[type="checkbox"] { accent-color: #4A90D9; width: 14px; height: 14px; }
.toggle-label { flex: 1; font-size: 12px; }

.btn { padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-primary { background: #4A90D9; color: #fff; } .btn-primary:hover { background: #357ABD; }
.btn-ghost { background: #f1f5f9; color: #475569; } .btn-ghost:hover { background: #e2e8f0; }
.btn-row { display: flex; gap: 6px; margin-top: 8px; }
.btn-row .btn { flex: 1; }

.legend { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #666; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

#stats {
  position: absolute; bottom: 12px; left: 12px; z-index: 1000;
  background: rgba(255,255,255,0.97); border-radius: 8px;
  padding: 8px 14px; font-size: 12px; color: #333;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); backdrop-filter: blur(8px);
}

.station-popup { font-size: 12px; line-height: 1.5; min-width: 260px; }
.station-popup h3 { font-size: 14px; margin-bottom: 4px; }
.station-popup .tag {
  display: inline-block; padding: 1px 6px; border-radius: 8px;
  font-size: 10px; margin-right: 3px; margin-bottom: 2px;
}
.station-popup .info-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #f5f5f5; }
.station-popup .info-row:last-of-type { border-bottom: none; }
.station-popup .info-label { color: #888; }
.station-popup .info-value { font-weight: 600; }
.popup-list { max-height: 250px; overflow-y: auto; margin-top: 6px; }
.popup-item { padding: 5px 0; border-bottom: 1px solid #f5f5f5; font-size: 11px; }
.popup-item:last-child { border-bottom: none; }
.popup-item a { color: #4A90D9; text-decoration: none; font-weight: 600; }
.popup-item a:hover { text-decoration: underline; }
.popup-item .pi-detail { color: #888; display: block; margin-top: 1px; }
.badge-new { background: #d4edda; color: #155724; padding: 1px 5px; border-radius: 8px; font-size: 9px; font-weight: 700; margin-left: 4px; }

.view-toggle {
  display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #d1d5db; margin-bottom: 8px;
}
.view-toggle button {
  flex: 1; padding: 6px 8px; border: none; background: #f8fafc; color: #64748b;
  font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.view-toggle button.active {
  background: #4A90D9; color: #fff;
}
.view-toggle button:hover:not(.active) { background: #e2e8f0; }

.marker-cluster-small { background-color: rgba(39, 174, 96, 0.5); }
.marker-cluster-small div { background-color: rgba(39, 174, 96, 0.7); }
.marker-cluster-medium { background-color: rgba(243, 156, 18, 0.5); }
.marker-cluster-medium div { background-color: rgba(243, 156, 18, 0.7); }
.marker-cluster-large { background-color: rgba(231, 76, 60, 0.5); }
.marker-cluster-large div { background-color: rgba(231, 76, 60, 0.7); }
.marker-cluster { color: #fff; font-weight: 700; font-size: 12px; }

@media (max-width: 600px) {
  #panel { width: calc(100vw - 24px); max-height: 45vh; top: auto; bottom: 56px; right: 12px; font-size: 12px; transition: transform 0.25s ease; }
  #panel.collapsed { transform: translateY(calc(100% - 44px)); }
  #panel.collapsed .panel-body { display: none; }
  #panel-toggle { display: flex; align-items: center; justify-content: center; padding: 8px; cursor: pointer; font-size: 12px; font-weight: 600; color: #4A90D9; user-select: none; }
  #panel-toggle::after { content: '▲'; margin-left: 6px; font-size: 10px; transition: transform 0.25s; }
  #panel.collapsed #panel-toggle::after { transform: rotate(180deg); }
}
</style>
</head>
<body>

<div id="map"></div>

<div id="panel" class="collapsed">
  <div id="panel-toggle" onclick="document.getElementById('panel').classList.toggle('collapsed')">フィルター</div>
  <div class="panel-body">
  <h1>SUUMO 物件マップ</h1>
  <div class="subtitle">2026-03-08 時点 · 41件 · <a href="dashboard.html">テーブルで見る →</a></div>

  <div class="section">
    <div class="view-toggle">
      <button id="btnStation" class="active" onclick="switchView('station')">駅で集約</button>
      <button id="btnProperty" onclick="switchView('property')">物件ごと</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">絞り込み</div>
    <div class="filter-row">
      <label>区</label>
      <select id="fWard"><option value="">すべて</option></select>
    </div>
    <div class="filter-row">
      <label>価格帯 (万円)</label>
      <div class="range-row">
        <input id="fPriceMin" type="number" placeholder="下限" step="500">
        <span>～</span>
        <input id="fPriceMax" type="number" placeholder="上限" step="500">
      </div>
    </div>
    <div class="filter-row">
      <label>広さ (m²)</label>
      <div class="range-row">
        <input id="fAreaMin" type="number" placeholder="下限" step="5">
        <span>～</span>
        <input id="fAreaMax" type="number" placeholder="上限" step="5">
      </div>
    </div>
    <div class="filter-row">
      <label>築年数</label>
      <select id="fAge">
        <option value="">すべて</option>
        <option value="5">5年以内</option>
        <option value="10">10年以内</option>
        <option value="15">15年以内</option>
        <option value="20">20年以内</option>
      </select>
    </div>
    <div class="filter-row">
      <label>間取り</label>
      <select id="fRooms">
        <option value="">すべて</option>
        <option value="2">2LDK以上</option>
        <option value="3">3LDK以上</option>
        <option value="4">4LDK以上</option>
      </select>
    </div>
    <div class="filter-row">
      <label>徒歩</label>
      <select id="fWalk">
        <option value="">すべて</option>
        <option value="5">5分以内</option>
        <option value="7">7分以内</option>
        <option value="10">10分以内</option>
        <option value="15">15分以内</option>
      </select>
    </div>
    <label class="toggle-row">
      <input type="checkbox" id="fNewOnly">
      <span class="toggle-label">新着のみ</span>
    </label>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="applyFilter()">絞り込み</button>
      <button class="btn btn-ghost" onclick="resetFilter()">リセット</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">凡例</div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#27ae60"></span>～4000万</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f39c12"></span>～5500万</div>
      <div class="legend-item"><span class="legend-dot" style="background:#e67e22"></span>～7000万</div>
      <div class="legend-item"><span class="legend-dot" style="background:#e74c3c"></span>7000万～</div>
    </div>
    <div style="font-size:10px;color:#999;margin-top:4px">円の大きさ＝物件数</div>
  </div>
  </div>
</div>

<div id="stats">
  <span id="statsStation">表示中: <strong id="stationCount">0</strong> 駅 / <strong id="listingCount">0</strong> 件</span>
  <span id="statsProperty" style="display:none">表示中: <strong id="propCount">0</strong> 件</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ============================================================
// DATA
// ============================================================
const STATIONS = [];
const PROPERTIES = [];
const WARDS = [];
let currentView = 'station';

// Populate ward dropdown
const wSel = document.getElementById('fWard');
WARDS.forEach(w => { const o = document.createElement('option'); o.value = w; o.textContent = w; wSel.appendChild(o); });

// ============================================================
// MAP
// ============================================================
const map = L.map('map', {
  center: [35.70, 139.72],
  zoom: 12,
  zoomControl: false
});
L.control.zoom({ position: 'bottomright' }).addTo(map);

// 国土地理院 淡色地図（日本語最適化、駅名・地名がくっきり）
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
  maxZoom: 18
}).addTo(map);

// OpenRailwayMap（路線をカラーで明確に表示）
L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openrailwaymap.org/">OpenRailwayMap</a>',
  subdomains: ['a','b','c'], maxZoom: 18, opacity: 0.6
}).addTo(map);

// ============================================================
// HELPERS
// ============================================================
function priceColor(price) {
  if (price < 4000) return '#27ae60';
  if (price < 5500) return '#f39c12';
  if (price < 7000) return '#e67e22';
  return '#e74c3c';
}

function markerRadius(count) {
  return 5 + Math.sqrt(count) * 2;
}

function gapColor(gap) {
  if (gap == null) return '#94a3b8';
  if (gap >= 15) return '#16a34a';
  if (gap >= 5) return '#22c55e';
  if (gap >= -5) return '#64748b';
  if (gap >= -15) return '#f97316';
  return '#dc2626';
}

function matchesFilter(r) {
  const ward = document.getElementById('fWard').value;
  const pMin = parseInt(document.getElementById('fPriceMin').value) || 0;
  const pMax = parseInt(document.getElementById('fPriceMax').value) || Infinity;
  const aMin = parseFloat(document.getElementById('fAreaMin').value) || 0;
  const aMax = parseFloat(document.getElementById('fAreaMax').value) || Infinity;
  const ageMax = parseInt(document.getElementById('fAge').value) || Infinity;
  const roomsMin = parseInt(document.getElementById('fRooms').value) || 0;
  const walkMax = parseInt(document.getElementById('fWalk').value) || Infinity;
  const newOnly = document.getElementById('fNewOnly').checked;

  if (ward && r.ward !== ward) return false;
  if (r.price < pMin || r.price > pMax) return false;
  if (r.area < aMin || r.area > aMax) return false;
  if (r.age > 0 && r.age > ageMax) return false;
  if (ageMax < Infinity && r.age === 0) return false;
  if (r.rooms < roomsMin) return false;
  if (r.walk > walkMax) return false;
  if (newOnly && !r.isNew) return false;
  return true;
}

// ============================================================
// STATION VIEW
// ============================================================
let stationMarkers = [];

function makeStationPopup(station) {
  const ls = station._filtered || station.listings;
  const prices = ls.map(l => l.price).filter(p => p > 0);
  const avg = prices.length ? Math.round(prices.reduce((a,b) => a+b, 0) / prices.length) : 0;
  const minP = prices.length ? Math.min(...prices) : 0;
  const maxP = prices.length ? Math.max(...prices) : 0;

  let html = '<div class="station-popup">';
  html += `<h3>${station.name}駅 (${ls.length}件)</h3>`;
  html += '<div style="margin-bottom:6px">';
  html += `<span class="tag" style="background:#e8f0fe;color:#1a73e8">${minP.toLocaleString()}～${maxP.toLocaleString()}万円</span>`;
  html += `<span class="tag" style="background:#f0fdf4;color:#166534">平均 ${avg.toLocaleString()}万円</span>`;
  html += '</div>';

  html += '<div class="popup-list">';
  const sorted = [...ls].sort((a,b) => a.price - b.price);
  for (const r of sorted.slice(0, 30)) {
    const newBadge = r.isNew ? '<span class="badge-new">NEW</span>' : '';
    const gapStr = r.gap != null ? `<span style="color:${gapColor(r.gap)};font-size:10px">${r.gap > 0 ? '+' : ''}${r.gap.toFixed(1)}%</span>` : '';
    html += `<div class="popup-item">
      <a href="${r.url}" target="_blank">${r.price.toLocaleString()}万円</a>${newBadge} ${gapStr}
      <span class="pi-detail">${r.area}m² / ${r.layout} / ${r.age > 0 ? '築' + r.age + '年' : '-'} / 徒歩${r.walk}分</span>
    </div>`;
  }
  if (ls.length > 30) {
    html += `<div class="popup-item" style="text-align:center;color:#94a3b8">他 ${ls.length - 30}件</div>`;
  }
  html += '</div></div>';
  return html;
}

function renderStationMarkers() {
  stationMarkers.forEach(m => map.removeLayer(m));
  stationMarkers = [];

  let totalListings = 0;
  for (const st of STATIONS) {
    const ls = st._filtered || st.listings;
    if (ls.length === 0) continue;
    totalListings += ls.length;

    const prices = ls.map(l => l.price).filter(p => p > 0);
    const avg = prices.length ? prices.reduce((a,b) => a+b, 0) / prices.length : 0;

    const marker = L.circleMarker([st.lat, st.lng], {
      radius: markerRadius(ls.length),
      fillColor: priceColor(avg),
      fillOpacity: 0.75,
      color: '#fff',
      weight: 1.5,
      opacity: 0.9,
    }).addTo(map);

    marker.bindTooltip(`${st.name} (${ls.length}件)`, {
      direction: 'top', offset: [0, -5]
    });
    marker.bindPopup(() => makeStationPopup(st), { maxWidth: 340, maxHeight: 420 });
    stationMarkers.push(marker);
  }

  document.getElementById('stationCount').textContent = STATIONS.filter(s => (s._filtered || s.listings).length > 0).length;
  document.getElementById('listingCount').textContent = totalListings.toLocaleString();
}

// ============================================================
// PROPERTY VIEW (markercluster)
// ============================================================
let propCluster = null;

function makePropertyPopup(r) {
  const newBadge = r.isNew ? '<span class="badge-new">NEW</span>' : '';
  const gapStr = r.gap != null ? `<span style="color:${gapColor(r.gap)};font-size:10px;margin-left:4px">${r.gap > 0 ? '+' : ''}${r.gap.toFixed(1)}%</span>` : '';
  return `<div class="station-popup">
    <h3><a href="${r.url}" target="_blank" style="color:#4A90D9;text-decoration:none">${r.name}</a>${newBadge}</h3>
    <div style="margin-bottom:6px">
      <span class="tag" style="background:#e8f0fe;color:#1a73e8">${r.price.toLocaleString()}万円</span>
      ${r.tsubo ? `<span class="tag" style="background:#fef3c7;color:#92400e">@${r.tsubo.toLocaleString()}万/坤</span>` : ''}
      ${gapStr}
    </div>
    <div class="info-row"><span class="info-label">広さ</span><span class="info-value">${r.area}m²</span></div>
    <div class="info-row"><span class="info-label">間取り</span><span class="info-value">${r.layout}</span></div>
    <div class="info-row"><span class="info-label">築年数</span><span class="info-value">${r.age > 0 ? r.age + '年' : '-'}</span></div>
    <div class="info-row"><span class="info-label">駅</span><span class="info-value">${r.station || '-'} 徒歩${r.walk}分</span></div>
  </div>`;
}

function renderPropertyMarkers() {
  if (propCluster) {
    map.removeLayer(propCluster);
    propCluster = null;
  }

  propCluster = L.markerClusterGroup({
    maxClusterRadius: 50,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: function(cluster) {
      const markers = cluster.getAllChildMarkers();
      const count = markers.length;
      let size = 'small';
      if (count >= 50) size = 'large';
      else if (count >= 10) size = 'medium';
      return L.divIcon({
        html: '<div>' + count + '</div>',
        className: 'marker-cluster marker-cluster-' + size,
        iconSize: L.point(40, 40)
      });
    }
  });

  let count = 0;
  for (const r of PROPERTIES) {
    if (!r.lat || !r.lng) continue;
    if (!matchesFilter(r)) continue;
    count++;

    const marker = L.circleMarker([r.lat, r.lng], {
      radius: 5,
      fillColor: priceColor(r.price),
      fillOpacity: 0.8,
      color: '#fff',
      weight: 1,
      opacity: 0.9,
    });
    marker.bindPopup(() => makePropertyPopup(r), { maxWidth: 300 });
    propCluster.addLayer(marker);
  }

  map.addLayer(propCluster);
  document.getElementById('propCount').textContent = count.toLocaleString();
}

// ============================================================
// VIEW SWITCHING
// ============================================================
function switchView(view) {
  currentView = view;
  document.getElementById('btnStation').classList.toggle('active', view === 'station');
  document.getElementById('btnProperty').classList.toggle('active', view === 'property');
  document.getElementById('statsStation').style.display = view === 'station' ? '' : 'none';
  document.getElementById('statsProperty').style.display = view === 'property' ? '' : 'none';

  // Clear both
  stationMarkers.forEach(m => map.removeLayer(m));
  stationMarkers = [];
  if (propCluster) { map.removeLayer(propCluster); propCluster = null; }

  if (view === 'station') {
    renderStationMarkers();
  } else {
    renderPropertyMarkers();
  }
}

// ============================================================
// FILTERS
// ============================================================
function applyFilter() {
  // Station view: filter per station
  for (const st of STATIONS) {
    st._filtered = st.listings.filter(matchesFilter);
  }

  if (currentView === 'station') {
    renderStationMarkers();
  } else {
    renderPropertyMarkers();
  }
}

function resetFilter() {
  document.getElementById('fWard').value = '';
  document.getElementById('fPriceMin').value = '';
  document.getElementById('fPriceMax').value = '';
  document.getElementById('fAreaMin').value = '';
  document.getElementById('fAreaMax').value = '';
  document.getElementById('fAge').value = '';
  document.getElementById('fRooms').value = '';
  document.getElementById('fWalk').value = '';
  document.getElementById('fNewOnly').checked = false;
  for (const st of STATIONS) { delete st._filtered; }
  applyFilter();
}

// Enter key + select change triggers filter
document.querySelectorAll('#panel input, #panel select').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') applyFilter(); });
  if (el.tagName === 'SELECT') el.addEventListener('change', applyFilter);
});
document.getElementById('fNewOnly').addEventListener('change', applyFilter);

// Initial render
renderStationMarkers();
</script>
</body>
</html>
